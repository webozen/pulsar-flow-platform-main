name: ci

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Opt JS actions into Node.js 24 (Node 20 deprecated on GitHub runners).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate YAML syntax
        # `kestra/flows/dental/*.yml` no longer exists — workflows are
        # generated dynamically by the Next.js orchestrator at deploy time
        # (see app/src/lib/workflow-generator.ts). Validate only the static
        # YAML that does live in this repo: the Kestra application config
        # and the per-clinic namespace templates.
        run: |
          pip install pyyaml --quiet
          shopt -s nullglob
          for f in kestra/namespace-configs/*.yml kestra/application.yml; do
            [ -f "$f" ] || continue
            echo "Validating $f..."
            python3 -c "import yaml; yaml.safe_load(open('$f'))" || exit 1
          done
          echo "All YAML files valid."

      - name: Validate Docker Compose
        run: docker compose config --quiet

  smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create .env
        run: cp .env.example .env

      - name: Start stack
        run: docker compose up -d

      - name: Wait for Kestra
        # Probe accepts any HTTP response from Kestra — once the webserver is
        # answering at all (even 405 on the bare /api/v1/flows route, which is
        # what Kestra returns when no query params are supplied) the process
        # is up. Don't pin a specific 2xx endpoint — Kestra's route shapes
        # change between minor versions.
        run: |
          for i in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/api/v1/flows 2>/dev/null || echo 000)
            if [ "$code" != "000" ]; then
              echo "Kestra responded with HTTP $code (boot complete)"
              break
            fi
            sleep 2
          done
          code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/api/v1/flows 2>/dev/null || echo 000)
          if [ "$code" = "000" ]; then
            echo "Kestra did not start"
            docker compose logs kestra
            exit 1
          fi

      # Flow loading + count verification removed: workflows are no longer
      # shipped as static YAML in `kestra/flows/dental/`. The orchestrator
      # generates them at deploy time (see app/src/lib/workflow-generator.ts).
      # Full flow-lifecycle smoke is covered by `e2e-nightly.yml`.

      - name: Cleanup
        if: always()
        run: docker compose down -v
