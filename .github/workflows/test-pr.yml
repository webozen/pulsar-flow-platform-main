name: test-pr

# Vitest unit suite on every PR + push to main.
# - typecheck via `tsc --noEmit`
# - vitest run with coverage gate (lines >= 55% — current is ~61%)
# Playwright lives in `e2e-nightly.yml` (heavier, needs services).

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  # Cancel duplicate runs for the same PR — only the latest commit's
  # CI is interesting, the others are wasted minutes.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests + coverage
        # @vitest/coverage-v8 is wired in vitest.config.ts. Coverage
        # threshold is enforced in this workflow, not the config —
        # so local `npx vitest run` doesn't fail on coverage drift.
        run: npx vitest run --coverage --coverage.thresholds.lines=55 --coverage.thresholds.statements=55

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: app/coverage
          retention-days: 7
