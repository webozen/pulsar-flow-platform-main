services:
  opendental-test:
    image: mysql:8.0
    container_name: flowcore-opendental-test
    environment:
      MYSQL_ROOT_PASSWORD: test
      MYSQL_DATABASE: opendental
    volumes:
      - ./tests/seed-data.sql:/docker-entrypoint-initdb.d/01-seed.sql
      - ./scripts/sql/V1__dental_automation_log.sql:/docker-entrypoint-initdb.d/02-automation-log.sql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
